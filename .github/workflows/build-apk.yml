name: Build WebView APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачиваем проект сборщика напрямую через официальный экшн GitHub
      - name: Download WebView Builder
        uses: actions/checkout@v4
        with:
          repository: 'h5web/webview-app-creator'
          path: 'builder'

      # Шаг 2: Создаем конфигурацию внутри папки сборщика
      - name: Configure App
        run: |
          echo '{
            "name": "ТВ 34",
            "url": "https://televizor34.onrender.com",
            "packageName": "ru.tv34.channels"
          }' > builder/config.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Шаг 3: Запускаем сборку
      - name: Build Release APK
        run: |
          cd builder
          chmod +x gradlew
          ./gradlew assembleRelease

      # Шаг 4: Забираем готовый APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tv34-release-apk
          path: builder/app/build/outputs/apk/release/*.apk
