name: Build WebView APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачиваем твой репозиторий (на всякий случай)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Клонируем сборщик в отдельную изолированную папку
      - name: Clone Webview Project
        run: |
          git clone https://github.com/h5web/webview-app-creator.git builder
          
      # Шаг 3: Создаем конфигурацию прямо внутри папки сборщика
      - name: Configure App
        run: |
          echo '{
            "name": "ТВ 34",
            "url": "https://televizor34.onrender.com",
            "packageName": "ru.tv34.channels"
          }' > builder/config.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Шаг 4: Запускаем сборку прямо внутри рабочей папки сборщика
      - name: Build Release APK
        run: |
          cd builder
          chmod +x gradlew
          ./gradlew assembleRelease

      # Шаг 5: Забираем готовый APK из папки сборщика
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tv34-release-apk
          path: builder/app/build/outputs/apk/release/*.apk
