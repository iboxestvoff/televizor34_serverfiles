name: Build WebView APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Webview Project
        run: |
          git clone https://github.com/h5web/webview-app-creator.git .
          
      - name: Configure App
        run: |
          # Указываем ссылку на твой Render-сайт и название приложения
          echo '{
            "name": "ТВ 34",
            "url": "https://televizor34.onrender.com",
            "packageName": "ru.televizor34.channels.monile"
          }' > config.json

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: televizor34-release-apk
          path: app/build/outputs/apk/release/*.apk