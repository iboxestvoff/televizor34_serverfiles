name: Build WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачиваем твой репозиторий (вместе с файлом icon.png)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Создаем структуру Android-проекта
      - name: Generate Android Project Structure
        run: |
          mkdir -p app/src/main/java/ru/tv34/channels
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      # Шаг 3: Обрабатываем и устанавливаем иконку (если она есть)
      - name: Setup App Icon
        run: |
          if [ -f "icon.png" ]; then
            sudo apt-get update && sudo apt-get install -y imagemagick
            convert icon.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "Иконка успешно добавлена!"
          else
            echo "Файл icon.png не найден в корне репозитория. Будет использована стандартная заглушка."
          fi

      # Шаг 4: Создаем AndroidManifest.xml (теперь с указанием иконки android:icon)
      - name: Create Android Manifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="ru.tv34.channels">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="ТВ 34"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # Шаг 5: Создаем разметку экрана с WebView
      - name: Create Layout
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          EOF

      # Шаг 6: Пишем Java-код для загрузки ссылки телевизора
      - name: Create MainActivity.java
        run: |
          cat << 'EOF' > app/src/main/java/ru/tv34/channels/MainActivity.java
          package ru.tv34.channels;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  WebView webView = findViewById(R.id.webview);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://televizor34.onrender.com");
              }
          }
          EOF

      # Шаг 7: Создаем конфигурационные файлы Gradle
      - name: Create Gradle Files
        run: |
          echo "include ':app'" > settings.gradle
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'ru.tv34.channels'
              compileSdk 34
              defaultConfig {
                  applicationId "ru.tv34.channels"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      # Шаг 8: Настраиваем Java окружение
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Шаг 9: Собираем проект с помощью официального экшена Gradle
      - name: Setup and Run Gradle
        uses: eskatos/gradle-command-action@v2
        with:
          gradle-version: '8.5'
          arguments: assembleRelease

      # Шаг 10: Сохраняем готовый файл для скачивания
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tv34-release-apk
          path: app/build/outputs/apk/release/*.apk
